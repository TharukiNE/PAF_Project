# IT3030 / GitHub Workflow — build & test on push and PR
# Uses current action majors (Node 24-based runtimes; avoids Node 20 deprecation warnings).
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Ensure Maven wrapper JAR (if not in repo)
        working-directory: backend
        run: |
          if [ ! -f .mvn/wrapper/maven-wrapper.jar ]; then
            mkdir -p .mvn/wrapper
            curl -fsSL -o .mvn/wrapper/maven-wrapper.jar \
              "https://repo.maven.apache.org/maven2/org/apache/maven/wrapper/maven-wrapper/3.3.2/maven-wrapper-3.3.2.jar"
          fi
      - name: Compile and test (backend)
        working-directory: backend
        run: |
          sed -i 's/\r$//' mvnw
          chmod +x mvnw
          ./mvnw -B -q verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm run build
